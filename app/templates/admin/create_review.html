<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Review</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-form-wrapper {
            width: min(950px, calc(100% - 24px));
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(180, 150, 205, 0.16);
        }

        .admin-form {
            display: grid;
            gap: 18px;
        }

        .admin-form label {
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #433a57;
            font-weight: 500;
        }

        .admin-form input,
        .admin-form textarea {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(180, 155, 200, 0.22);
            font: inherit;
            background: #fff;
        }

        .admin-form textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 14px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }

        .preview-card {
            border: 1px solid rgba(180, 155, 200, 0.22);
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
        }

        .preview-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
        }

        .preview-card p {
            padding: 8px 10px;
            font-size: 0.85rem;
            color: #7d7391;
            word-break: break-word;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (max-width: 700px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-form-wrapper">
        <h1>Create Review</h1>

        <form method="POST" enctype="multipart/form-data" class="admin-form">
            <label>
                Customer Name
                <input type="text" name="customer_name" required>
            </label>

            <div class="form-row">
                <label>
                    Review Title
                    <input type="text" name="title" required>
                </label>

                <label>
                    Score
                    <input type="text" name="score" value="★★★★★">
                </label>
            </div>

            <label>
                Badge
                <input type="text" name="badge" placeholder="Optional">
            </label>

            <label>
                Review Text
                <textarea name="review_text" required></textarea>
            </label>

            <label>
                Review Images
                <input type="file" name="images" id="reviewImagesInput" multiple accept=".png,.jpg,.jpeg,.gif,.webp">
            </label>

            <div id="reviewImagePreview" class="preview-grid"></div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Review</button>
                <a href="{{ url_for('main.reviews_dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        const reviewImagesInput = document.getElementById("reviewImagesInput");
        const reviewImagePreview = document.getElementById("reviewImagePreview");

        if (reviewImagesInput && reviewImagePreview) {
            reviewImagesInput.addEventListener("change", function () {
                reviewImagePreview.innerHTML = "";
                const files = Array.from(this.files);

                files.forEach((file) => {
                    if (!file.type.startsWith("image/")) return;

                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const card = document.createElement("div");
                        card.className = "preview-card";
                        card.innerHTML = `
                            <img src="${e.target.result}" alt="${file.name}">
                            <p>${file.name}</p>
                        `;
                        reviewImagePreview.appendChild(card);
                    };
                    reader.readAsDataURL(file);
                });
            });
        }
    </script>
</body>
</html>
